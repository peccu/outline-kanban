services:
  app:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: ghcr.io/peccu/outline-kanban:latest
    container_name: outline-kanban
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: "8787"
      DB_PATH: /data/outline-kanban.sqlite
    volumes:
      - outline-kanban-data:/data

volumes:
  outline-kanban-data:
